<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Casos de Uso — CondConnect</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #dce3ea; padding: 28px; }
  .page { background: white; border: 2px solid #2d3748; display: inline-block; }
</style>
</head>
<body>
<div class="page">
<svg width="1100" height="840" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI',Arial,sans-serif">

  <!-- ══ TÍTULO ══ -->
  <text x="550" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">
    Diagrama de Casos de Uso — CondConnect
  </text>

  <!-- ══ FRONTEIRA DO SISTEMA ══ -->
  <rect x="195" y="35" width="710" height="772" rx="8"
        fill="none" stroke="#2d3748" stroke-width="2"/>
  <text x="209" y="52" font-size="10" fill="#888" font-style="italic">«sistema» CondConnect</text>

  <!-- divisória central tracejada -->
  <line x1="550" y1="58" x2="550" y2="797"
        stroke="#b0bec5" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- rótulos de coluna -->
  <text x="372" y="70" text-anchor="middle" font-size="9" font-weight="700"
        fill="#aaa" letter-spacing="1">MORADOR</text>
  <text x="735" y="70" text-anchor="middle" font-size="9" font-weight="700"
        fill="#aaa" letter-spacing="1">ADMINISTRADOR</text>

  <!-- ══════════════════════════════════════════
       ATOR: Morador  (cx=90, cy=400)
  ══════════════════════════════════════════ -->
  <circle cx="90" cy="350" r="22" fill="none" stroke="#2d3748" stroke-width="2"/>
  <line x1="90"  y1="372" x2="90"  y2="432" stroke="#2d3748" stroke-width="2"/>
  <line x1="55"  y1="397" x2="125" y2="397" stroke="#2d3748" stroke-width="2"/>
  <line x1="90"  y1="432" x2="60"  y2="472" stroke="#2d3748" stroke-width="2"/>
  <line x1="90"  y1="432" x2="120" y2="472" stroke="#2d3748" stroke-width="2"/>
  <text x="90" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">Morador</text>

  <!-- ══════════════════════════════════════════
       CASOS DE USO — Morador  (cx=372, w=204)
       y centers: 96, 174, 252, 330, 408, 486, 564, 642, 720
  ══════════════════════════════════════════ -->

  <!-- UC01: Cadastrar-se -->
  <line x1="112" y1="360" x2="270" y2="96"  stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="78"  width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="99"  text-anchor="middle" font-size="11" fill="#1a202c">Cadastrar-se</text>

  <!-- UC02: Realizar login -->
  <line x1="112" y1="365" x2="270" y2="174" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="156" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="177" text-anchor="middle" font-size="11" fill="#1a202c">Realizar login</text>

  <!-- UC03: Editar perfil -->
  <line x1="112" y1="370" x2="270" y2="252" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="234" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="255" text-anchor="middle" font-size="11" fill="#1a202c">Editar perfil</text>

  <!-- UC04: Publicar produto -->
  <line x1="112" y1="375" x2="270" y2="330" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="312" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="333" text-anchor="middle" font-size="11" fill="#1a202c">Publicar produto</text>

  <!-- UC05: Buscar / filtrar produtos -->
  <line x1="112" y1="380" x2="270" y2="408" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="390" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="411" text-anchor="middle" font-size="11" fill="#1a202c">Buscar / filtrar produtos</text>

  <!-- UC06: Favoritar produto -->
  <line x1="112" y1="385" x2="270" y2="486" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="468" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="489" text-anchor="middle" font-size="11" fill="#1a202c">Favoritar produto</text>

  <!-- UC07: Enviar e receber mensagens -->
  <line x1="112" y1="390" x2="270" y2="564" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="546" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="560" text-anchor="middle" font-size="10.5" fill="#1a202c">Enviar e receber</text>
  <text x="372" y="574" text-anchor="middle" font-size="10.5" fill="#1a202c">mensagens</text>

  <!-- UC08/09: Negociar / fazer pedido -->
  <line x1="112" y1="396" x2="270" y2="642" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="624" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="638" text-anchor="middle" font-size="10.5" fill="#1a202c">Enviar proposta /</text>
  <text x="372" y="652" text-anchor="middle" font-size="10.5" fill="#1a202c">Realizar pedido</text>

  <!-- UC11: Avaliar produto -->
  <line x1="112" y1="402" x2="270" y2="720" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="270" y="702" width="204" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="372" y="723" text-anchor="middle" font-size="11" fill="#1a202c">Avaliar produto</text>

  <!-- ══════════════════════════════════════════
       ATOR: Administrador  (cx=1010, cy=310)
  ══════════════════════════════════════════ -->
  <circle cx="1010" cy="295" r="22" fill="none" stroke="#2d3748" stroke-width="2"/>
  <line x1="1010" y1="317" x2="1010" y2="377" stroke="#2d3748" stroke-width="2"/>
  <line x1="975"  y1="342" x2="1045" y2="342" stroke="#2d3748" stroke-width="2"/>
  <line x1="1010" y1="377" x2="980"  y2="417" stroke="#2d3748" stroke-width="2"/>
  <line x1="1010" y1="377" x2="1040" y2="417" stroke="#2d3748" stroke-width="2"/>
  <text x="1010" y="440" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">Administrador</text>

  <!-- ══════════════════════════════════════════
       CASOS DE USO — Admin  (cx=735, w=228)
       y centers: 130, 230, 330, 430, 530
  ══════════════════════════════════════════ -->

  <!-- UC12: Gerenciar usuários -->
  <line x1="988" y1="288" x2="852" y2="130" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="621" y="112"  width="228" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="735" y="133" text-anchor="middle" font-size="11" fill="#1a202c">Gerenciar usuários</text>

  <!-- UC13: Bloquear usuários -->
  <line x1="988" y1="296" x2="852" y2="230" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="621" y="212" width="228" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="735" y="233" text-anchor="middle" font-size="11" fill="#1a202c">Bloquear usuários</text>

  <!-- UC14: Gerenciar produtos -->
  <line x1="988" y1="305" x2="852" y2="330" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="621" y="312" width="228" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="735" y="333" text-anchor="middle" font-size="11" fill="#1a202c">Gerenciar produtos</text>

  <!-- UC15: Gerenciar pedidos -->
  <line x1="988" y1="315" x2="852" y2="430" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="621" y="412" width="228" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="735" y="433" text-anchor="middle" font-size="11" fill="#1a202c">Gerenciar pedidos</text>

  <!-- UC16: Visualizar estatísticas do painel -->
  <line x1="988" y1="326" x2="852" y2="530" stroke="#2d3748" stroke-width="1.2"/>
  <rect x="621" y="512" width="228" height="36" rx="18" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="735" y="526" text-anchor="middle" font-size="10.5" fill="#1a202c">Visualizar estatísticas</text>
  <text x="735" y="540" text-anchor="middle" font-size="10.5" fill="#1a202c">do painel</text>

  <!-- ══ LEGENDA ══ -->
  <rect x="617" y="578" width="232" height="130" rx="4"
        fill="#f8fafc" stroke="#cbd5e0" stroke-width="1"/>
  <text x="733" y="596" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Legenda</text>

  <!-- ator -->
  <circle cx="636" cy="618" r="8" fill="none" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="636" y1="626" x2="636" y2="638" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="626" y1="632" x2="646" y2="632" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="636" y1="638" x2="629" y2="648" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="636" y1="638" x2="643" y2="648" stroke="#2d3748" stroke-width="1.5"/>
  <text x="656" y="637" font-size="10" fill="#333">— Ator</text>

  <!-- caso de uso -->
  <rect x="624" y="658" width="60" height="20" rx="10" fill="white" stroke="#2d3748" stroke-width="1.5"/>
  <text x="654" y="672" text-anchor="middle" font-size="8" fill="#333">caso de uso</text>
  <text x="694" y="672" font-size="10" fill="#333">— Caso de uso</text>

  <!-- associação -->
  <line x1="624" y1="694" x2="684" y2="694" stroke="#2d3748" stroke-width="1.2"/>
  <text x="694" y="698" font-size="10" fill="#333">— Associação</text>

</svg>
</div>
</body>
</html>
