<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <base href="/tcc-2025-1-e-2-condconnect/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - CondConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-logo">
            <img src="/static/assets/images/logo_comfundo.png" alt="CondConnect">
        </div>

        <h1 class="auth-title">Bem-vindo de volta!</h1>
        <p class="auth-subtitle">Entre para acessar o marketplace</p>

        <form class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control"
                    placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>

            <a href="/Templates/esqueci-senha.html" class="forgot-password">Esqueci minha senha</a>

            <button type="button" class="auth-btn">Entrar</button>
        </form>

        <div class="auth-footer">
            Não tem uma conta? <a href="/Templates/cadastro.html">Cadastre-se</a><br>
            <div style="margin-top: 12px; font-size: 11px;">
                <a href="/Templates/termos.html" style="color: #94a3b8; text-decoration: none;">Privacidade</a> •
                <a href="/Templates/termos.html" style="color: #94a3b8; text-decoration: none;">Termos de Uso</a>
            </div>
        </div>

        <a href="/Templates/index.html" class="back-link">← Voltar para home</a>
    </div>


    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
</body>

</html>
