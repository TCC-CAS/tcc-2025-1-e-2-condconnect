<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - CondConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="/Templates/index.html" class="sidebar-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>CondConnect</span>
        </a>

        <div class="user-profile-preview">
            <div class="user-avatar-small" style="background: var(--error);">A</div>
            <div class="user-info-small">
                <span class="name">Administrador</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="/Templates/dashboard.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="/Templates/admin.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="M12 8v4"></path>
                    <path d="M12 16h.01"></path>
                </svg>
                <span>Moderação</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/Templates/login.html" class="logout-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="page-header">
            <h1>Painel de Moderação</h1>
            <p>Gerencie anúncios e usuários do condomínio</p>
        </header>

        <section class="admin-stats"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px;">
            <div class="stat-card">
                <div class="stat-info">
                    <span>Total de Anúncios</span>
                    <strong>42</strong>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <span>Usuários Ativos</span>
                    <strong>128</strong>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <span>Denúncias</span>
                    <strong style="color: var(--error);">0</strong>
                </div>
            </div>
        </section>

        <section class="moderation-list"
            style="background: white; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-md);">
            <h2 style="font-size: 18px; margin-bottom: 20px;">Anúncios Recentes</h2>
            <div id="admin-product-list" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- Admin products will be rendered here -->
            </div>
        </section>

        <footer class="dashboard-footer">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="/Templates/termos.html">Privacidade</a>
                    <a href="/Templates/termos.html">Termos</a>
                    <a href="#">Ajuda</a>
                    <a href="#">Contato</a>
                </div>
                <div class="footer-copyright">
                    © 2026 CondConnect. Todos os direitos reservados.
                </div>
            </div>
        </footer>
    </main>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/admin.js"></script>
</body>

</html>
