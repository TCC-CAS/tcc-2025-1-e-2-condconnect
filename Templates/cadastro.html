<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <base href="/tcc-2025-1-e-2-condconnect/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - CondConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/accessibility.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="auth-body">

    <div class="auth-card" style="max-width: 520px;">
        <div class="auth-logo">
            <img src="/static/assets/images/logo_comfundo.png" alt="CondConnect">
        </div>

        <h1 class="auth-title">Criar Nova Conta</h1>
        <p class="auth-subtitle">Preencha os dados para se cadastrar</p>

        <form class="auth-form">

            <!-- Nome + Email -->
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" class="form-control" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com">
                </div>
            </div>

            <!-- CPF + Telefone -->
            <div class="form-row">
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" class="form-control" placeholder="(11) 99999-9999" maxlength="15" inputmode="numeric">
                </div>
            </div>

            <!-- Senha + Confirmar -->
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirmar Senha</label>
                    <input type="password" id="password_confirm" class="form-control" placeholder="••••••••">
                </div>
            </div>

            <!-- Apto + Bloco -->
            <div class="form-row">
                <div class="form-group">
                    <label for="apto">Número do Apartamento</label>
                    <input type="text" id="apto" class="form-control" placeholder="Ex: 101">
                </div>
                <div class="form-group">
                    <label for="block">Bloco</label>
                    <input type="text" id="block" class="form-control" placeholder="Ex: A">
                </div>
            </div>

            <!-- Separador endereço -->
            <p style="font-size:13px;font-weight:600;color:#64748b;margin:8px 0 4px;letter-spacing:.3px;">ENDEREÇO</p>

            <!-- CEP + Número -->
            <div class="form-row">
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <div style="position:relative;">
                        <input type="text" id="cep" class="form-control" placeholder="00000-000" maxlength="9" inputmode="numeric">
                        <span id="cep-spinner" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:#00a6a6;">⟳</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" id="numero" class="form-control" placeholder="Ex: 123">
                </div>
            </div>

            <!-- Logradouro -->
            <div class="form-group">
                <label for="logradouro">Rua / Logradouro</label>
                <input type="text" id="logradouro" class="form-control" placeholder="Preenchido automaticamente pelo CEP">
            </div>

            <!-- Bairro + Cidade + Estado -->
            <div class="form-row">
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" class="form-control" placeholder="Bairro">
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" class="form-control" placeholder="Cidade">
                </div>
                <div class="form-group" style="max-width:80px;">
                    <label for="estado">UF</label>
                    <input type="text" id="estado" class="form-control" placeholder="SP" maxlength="2">
                </div>
            </div>

            <!-- LGPD -->
            <div class="form-group checkbox-group"
                style="display: flex; align-items: flex-start; gap: 10px; margin-top: 10px;">
                <input type="checkbox" id="lgpd_consent" style="margin-top: 4px;" required>
                <label for="lgpd_consent" style="font-size: 13px; color: #6b7280; cursor: pointer;">
                    Li e concordo com os <a href="/Templates/termos.html"
                        style="color: var(--primary); text-decoration: none; font-weight: 600;">Termos de Uso</a> e a <a
                        href="/Templates/termos.html"
                        style="color: var(--primary); text-decoration: none; font-weight: 600;">Política de
                        Privacidade</a> (LGPD).
                </label>
            </div>

            <div class="g-recaptcha" data-sitekey="6LcuN-wsAAAAAGUWIGWmaOyTI5qTyAsmuOWU1RwA" style="margin-bottom:16px;"></div>
            <button type="submit" class="auth-btn">Criar Conta</button>
        </form>

        <div class="auth-footer">
            Já tem uma conta? <a href="/Templates/login.html">Fazer login</a>
        </div>

        <a href="/Templates/index.html" class="back-link">← Voltar para home</a>
    </div>


    <script src="/static/js/main.js?v=2"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/accessibility.js" defer></script>
</body>

</html>
