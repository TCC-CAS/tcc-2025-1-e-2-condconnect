    <script>
    document.addEventListener('DOMContentLoaded', async function () {
        const vendorContent = document.getElementById('vendor-content');
        const vendorId = parseInt(new URLSearchParams(window.location.search).get('id'));

        if (!vendorId) {
            vendorContent.innerHTML = '<div style="text-align:center;padding:60px;color:#dc2626;">Vendedor não encontrado.</div>';
            return;
        }

        try {
            const v = await CondConnect.api(`/usuarios/perfil?id=${vendorId}`);

            const initials = v.nome ? v.nome.trim().split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase() : '?';
            const avatarHtml = v.foto_url
                ? `<img src="${v.foto_url}" style="width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--primary);">`
                : `<div style="width:88px;height:88px;border-radius:50%;background:var(--primary);color:white;font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;">${initials}</div>`;

            const stars = Array(5).fill(0).map((_, i) => {
                const filled = i < Math.round(v.rating);
                return `<svg width="14" height="14" fill="${filled ? '#f59e0b' : '#e2e8f0'}" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
            }).join('');

            const membro_desde = new Date(v.criado_em).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            vendorContent.innerHTML = `
                <!-- Perfil Card -->
                <div style="background:white;border-radius:20px;padding:32px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:28px;">
                    <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;">
                        ${avatarHtml}
                        <div style="flex:1;min-width:200px;">
                            <h1 style="font-size:24px;font-weight:800;color:#1e293b;margin:0 0 6px 0;">${v.nome}</h1>
                            <p style="color:#64748b;font-size:14px;margin:0 0 10px 0;">
                                📍 Bloco ${v.bloco || '—'} · Apto ${v.apartamento || '—'}
                            </p>
                            <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;">
                                ${stars}
                                <span style="font-size:14px;font-weight:700;color:#1e293b;margin-left:4px;">${v.rating.toFixed(1)}</span>
                                <span style="color:#94a3b8;font-size:13px;">· Membro desde ${membro_desde}</span>
                            </div>
                            <div style="display:flex;gap:20px;flex-wrap:wrap;">
                                <div style="text-align:center;">
                                    <div style="font-size:22px;font-weight:800;color:var(--primary);">${v.total_vendas || 0}</div>
                                    <div style="font-size:12px;color:#64748b;">Vendas</div>
                                </div>
                                <div style="text-align:center;">
                                    <div style="font-size:22px;font-weight:800;color:var(--primary);">${v.total_produtos || 0}</div>
                                    <div style="font-size:12px;color:#64748b;">Anúncios</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    ${v.bio ? `<p style="margin:20px 0 0;padding:16px;background:#f8fafc;border-radius:10px;font-size:14px;color:#374151;line-height:1.6;">${v.bio}</p>` : ''}

                    <!-- Info grid -->
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:20px;">
                        ${v.pix_key ? `
                        <div style="padding:14px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;">
                            <div style="font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Chave Pix</div>
                            <div style="font-size:14px;font-weight:600;color:#1e293b;word-break:break-all;">${v.pix_key}</div>
                        </div>` : ''}
                        <div style="padding:14px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;">
                            <div style="font-size:11px;font-weight:700;color:#1d4ed8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Avaliação</div>
                            <div style="font-size:14px;font-weight:600;color:#1e293b;">${v.rating.toFixed(1)} / 5.0</div>
                        </div>
                    </div>
                </div>

                <!-- Produtos -->
                <h2 style="font-size:20px;font-weight:700;color:#1e293b;margin:0 0 16px 0;">
                    Produtos à Venda <span style="font-size:14px;font-weight:400;color:#64748b;">(${(v.produtos || []).length})</span>
                </h2>
                ${(v.produtos || []).length === 0
                    ? '<div style="text-align:center;padding:40px;background:white;border-radius:16px;color:#64748b;">Nenhum produto disponível no momento.</div>'
                    : `<div class="products-grid">${(v.produtos || []).map(p => `
                        <a href="/Templates/detalhes-produto.html?id=${p.id}" class="product-card" style="text-decoration:none;display:block;">
                            <div class="product-image-wrapper">
                                <img src="${p.foto || '/static/assets/images/produto-placeholder.jpg'}" alt="${p.titulo}" class="product-image">
                                <span class="product-condition">${p.condicao}</span>
                            </div>
                            <div class="product-details">
                                <h3 class="product-title">${p.titulo}</h3>
                                <div class="product-price">${p.preco_fmt}</div>
                            </div>
                        </a>`).join('')}
                    </div>`
                }

                ${v.avaliacoes?.length ? `
                <h2 style="font-size:20px;font-weight:700;color:#1e293b;margin:28px 0 16px 0;">Avaliações</h2>
                <div style="background:white;border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
                    ${v.avaliacoes.map(a => {
                        const av_stars = Array(5).fill(0).map((_, i) =>
                            `<svg width="12" height="12" fill="${i < a.nota ? '#f59e0b' : '#e2e8f0'}" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`
                        ).join('');
                        return `<div style="border-bottom:1px solid #f1f5f9;padding:16px 0;">
                            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                                <div style="width:28px;height:28px;border-radius:50%;background:var(--primary);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;">${a.avaliador?.[0] || 'U'}</div>
                                <div>
                                    <span style="font-size:13px;font-weight:600;color:#1e293b;">${a.avaliador}</span>
                                    <div style="display:flex;gap:2px;margin-top:1px;">${av_stars}</div>
                                </div>
                                <span style="margin-left:auto;font-size:11px;color:#94a3b8;">${new Date(a.criado_em).toLocaleDateString('pt-BR')}</span>
                            </div>
                            ${a.comentario ? `<p style="margin:0;font-size:13px;color:#4b5563;line-height:1.5;">${a.comentario}</p>` : ''}
                        </div>`;
                    }).join('')}
                </div>` : ''}
            `;
        } catch (err) {
            vendorContent.innerHTML = '<div style="text-align:center;padding:60px;color:#dc2626;">Erro ao carregar perfil do vendedor.</div>';
        }

        CondConnect.syncUserRole();
        CondConnect.syncUserHeader();
        CondConnect.initMobileNav();
        CondConnect.initNotifications();
    });
    </script>
