# CondConnect Apache Proxy Configuration for Flask Backend
# Place this inside your VirtualHost block (port 80 and 443)
# or include it: Include /var/www/html/condconnect/backend/python/apache_proxy.conf

# Proxy all /backend/api/ requests to Flask (port 5000)
ProxyPreserveHost On
ProxyPass /backend/api/ http://127.0.0.1:5000/
ProxyPassReverse /backend/api/ http://127.0.0.1:5000/

# Forward real IP to Flask
RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}e"
RequestHeader set X-Real-IP "%{REMOTE_ADDR}e"

# Allow sessions/cookies through proxy
Header always set Access-Control-Allow-Credentials "true"
