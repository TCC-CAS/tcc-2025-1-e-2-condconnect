[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --json-report
    --json-report-file=tests/results.json
    --html=tests/report.html
    --self-contained-html
markers =
    unit: testes unitários (sem dependências externas)
    integration: testes de integração com API mockada
    security: testes de segurança
    e2e: testes end-to-end com Playwright (requerem servidor no ar)
